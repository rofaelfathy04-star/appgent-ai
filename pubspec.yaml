name: appgen_ai
description: AI App Builder - Generate full apps from an idea
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  google_fonts: ^6.2.1
  http: ^1.1.2
  flutter_animate: ^4.5.0
  dio: ^5.4.0
  shared_preferences: ^2.2.2

flutter:
  uses-material-design: true
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf